      #     xcode-project run-tests \
      #       --project Samples/Swift/OCRStudioSDKSample.xcodeproj \
      #       --scheme OCRAuthHardenedTests \
      #       --device "iPhone 16"
      #   test_report: build/ios/test/*.xml
