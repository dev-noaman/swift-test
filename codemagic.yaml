workflows:
  hardened-auth-tests:
    name: Hardened auth XCTest
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Run HardenedAuth package tests
        script: |
          set -euo pipefail
          cd research/verification
          swift --version
          swift test --parallel 2>&1 | tee "$CM_BUILD_DIR/hardened-auth-test.log"
          # Fail the build if any test failed (swift test exit code already does this).
    artifacts:
      - hardened-auth-test.log
